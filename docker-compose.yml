services:
  db:
    image: postgres:16
    container_name: closetmuse-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: closetmuse
    ports:
      - "5432:5432"
    volumes:
      - closetmuse_pgdata:/var/lib/postgresql/data
volumes:
  closetmuse_pgdata:
